services:
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: sensors
      POSTGRES_PASSWORD: sensors_pass
      POSTGRES_DB: sensors_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db_scripts/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./db_scripts/02_seed_demo.sql:/docker-entrypoint-initdb.d/02_seed_demo.sql:ro
      - ./db_scripts/03_auth_biometric.sql:/docker-entrypoint-initdb.d/03_auth_biometric.sql:ro
  web:
    build:
      context: ./backend
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=host=db port=5432 dbname=sensors_db user=sensors password=sensors_pass
      - MAPAS_PORT=8081
      - MAPAS_DATA_ROOT=/data
      - BIOMETRIC_PROVIDER=dermalog_cli
      - DERMALOG_REQUIRED=false
      - DERMALOG_CLI_PATH=/opt/dermalog-sdk/bin/dermalog-face-cli
      - DERMALOG_SDK_DIR=/opt/dermalog-sdk
      - BIOMETRIC_DNN_ENABLE=${BIOMETRIC_DNN_ENABLE:-false}
      - BIOMETRIC_DNN_MODEL=/opt/biometric-models/face_qc.onnx
      - BIOMETRIC_DNN_LABELS=${BIOMETRIC_DNN_LABELS:-glasses,hat,mask,makeup,eyes_closed,mouth_open,non_frontal}
      - BIOMETRIC_DNN_THRESHOLD=${BIOMETRIC_DNN_THRESHOLD:-0.72}
      - AUTH_ADMIN_USERS=admin
    depends_on:
      - db
    volumes:
      - ./data:/data
      - ${DERMALOG_SDK_HOST_DIR:-./dermalog-sdk}:/opt/dermalog-sdk:ro
      - ${BIOMETRIC_MODEL_HOST_DIR:-./biometric-models}:/opt/biometric-models:ro

volumes:
  db_data: {}

networks:
  default:
    driver: bridge
