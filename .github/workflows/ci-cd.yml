name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend image (local tag)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: build/backend:pr-${{ github.sha }}

      - name: Build frontend assets and run tests
        working-directory: ./frontend
        run: |
          npm ci
          npm run build --if-present
          npm test --if-present

      - name: Build frontend image (local tag)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: build/frontend:pr-${{ github.sha }}
      - name: Run integration stack with docker-compose
        run: |
          sudo apt-get update && sudo apt-get install -y docker-compose-plugin
          docker compose -f docker-compose.yml up -d --build
          chmod +x ./scripts/ci/smoke_test.sh || true
          ./scripts/ci/smoke_test.sh
        env:
          CI: true
        timeout-minutes: 15
      - name: Tear down compose stack
        if: always()
        run: |
          docker compose -f docker-compose.yml down --volumes --remove-orphans

  publish:
    name: Publish images to Docker Hub
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/informe-backend:latest

      - name: Build and push frontend to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/informe-frontend:latest

