name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request: {}
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: frontend

      - name: Run unit tests (Vitest)
        run: npm run test:run --if-present
        working-directory: frontend

      - name: Run auth API contract tests
        run: npm run test:api --if-present
        working-directory: frontend

      - name: Start preview server
        run: npx vite preview --port 4173 &
        working-directory: frontend

      - name: Wait for preview
        run: |
          npx wait-on http://localhost:4173/ --timeout 30000
        working-directory: frontend

      - name: Run Playwright E2E
        run: npx playwright test --reporter=list
        working-directory: frontend

  sync-script-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test PowerShell sync script (dry-run)
        shell: pwsh
        run: |
          ./subir-github.ps1 -RepoPath "${{ github.workspace }}" -Branch "${{ github.ref_name }}" -DryRun
