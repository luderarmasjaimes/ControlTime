version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: sensors
      POSTGRES_PASSWORD: sensors_pass
      POSTGRES_DB: sensors_db
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-yourorg}/informe-backend:latest
    environment:
      - DATABASE_URL=host=db port=5432 dbname=sensors_db user=sensors password=sensors_pass
      - MAPAS_PORT=8081
      - MAPAS_DATA_ROOT=/data
      - AI_ENGINE_URL=http://ai_engine:5000
      - AI_ENGINE_TIMEOUT_MS=120
      - AI_ENGINE_MAX_IMAGE_BYTES=450000
      - BIOMETRIC_IMAGE_OPTIMIZER_ENABLE=false
      - BIOMETRIC_MAX_PIXELS=921600
    depends_on:
      - db
      - ai_engine
    networks:
      default:
        aliases:
          - backend
    volumes:
      - ./data:/data:ro
    ports:
      - "8082:8081"
      - "8443:8443"
    restart: unless-stopped

  tileserver:
    image: ghcr.io/consbio/mbtileserver:latest
    volumes:
      - ./data:/tilesets:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8000/services || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  ai_engine:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-yourorg}/informe-ai-engine:latest
    restart: unless-stopped
    expose:
      - "5000"

  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-yourorg}/informe-frontend:latest
    ports:
      - "5173:80"
    depends_on:
      - web
      - tileserver
    volumes:
      - ./data:/data:ro
    restart: unless-stopped

volumes:
  db_data: {}

networks:
  default:
    driver: bridge
