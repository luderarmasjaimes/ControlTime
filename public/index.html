<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ControlTime – Monitoreo GPS en Tiempo Real</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-brand">
      <span class="brand-icon">📍</span>
      <h1>ControlTime</h1>
      <span class="brand-tagline">Monitoreo GPS en Tiempo Real</span>
    </div>
    <div class="header-status">
      <span id="connection-status" class="status-badge status-disconnected">Desconectado</span>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <div class="app-layout">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">

      <!-- Registration / Tracking Panel -->
      <div class="panel" id="panel-register">
        <h2 class="panel-title">Compartir Ubicación</h2>
        <form id="register-form" autocomplete="off">
          <label for="user-name">Tu nombre</label>
          <input id="user-name" type="text" maxlength="50"
                 placeholder="Ej: María García" required />
          <button type="submit" class="btn btn-primary" id="btn-start">
            Iniciar Seguimiento
          </button>
        </form>
        <button class="btn btn-danger" id="btn-stop" style="display:none;">
          Detener Seguimiento
        </button>
        <p id="my-location-info" class="location-info"></p>
      </div>

      <!-- Active Users List -->
      <div class="panel">
        <h2 class="panel-title">
          Usuarios Activos
          <span id="user-count" class="badge">0</span>
        </h2>
        <ul id="users-list" class="users-list">
          <li class="no-users">No hay usuarios activos</li>
        </ul>
      </div>

    </aside>

    <!-- ===== MAP ===== -->
    <main class="map-container">
      <div id="map"></div>
    </main>

  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLnI=" crossorigin=""></script>

  <!-- Socket.io client -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- App logic -->
  <script src="js/app.js"></script>

</body>
</html>
